{
    "psa_framework_version": 1.1,
    "description": "System Secure Partition",
    "name": "SYSTEM_SP",
    "type": "APPLICATION-ROT",
    "priority": "HIGH",
    "model": "IPC",
    "entry_point": "System_sp_main",
    "stack_size": "0x1000",
    "services" : [
        {
            "description": "TI System ARoT Service",
            "name": "TI_SYSTEM_SERVICE",
            "sid": "0xAE000500",  # VendorID = 0xAE000, FunctionID = 0x500 (arbitrary)
            "non_secure_clients": true,
            "connection_based": true,
            "version": 1,
            "version_policy": "STRICT",
        }
    ],
    "irqs": [
        # All IRQs use First-Level Interrupt Handling (FLIH) without asserting a
        # signal since IRQs may occur while inside Non-Secure Processing
        # Environment (NSPE) and the Secure Partition (SP) would not be
        # scheduled to process the signal.
        {
             "description": "AON_PMU_COMB event mapped to CPUIRQ2 by BatMonSupportLPF3 driver",
             "source": "CPUIRQ2_IRQn",
             "name": "CPUIRQ2_IRQn",
             "handling": "FLIH"
        },
    ],
}
